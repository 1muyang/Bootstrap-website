<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>后台管理系统</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛠️</text></svg>">
  <style>
    :root{
      --navy:#0f172a; --navy-2:#1e293b; --slate:#475569; --muted:#64748b;
      --line:#e2e8f0; --bg:#f8fafc; --accent:#2563eb; --accent-2:#1d4ed8;
      --amber:#f59e0b; --white:#fff; --radius:14px;
      --green:#16a34a; --red:#ef4444;
      --shadow:0 10px 30px -12px rgba(15,23,42,.18);
      --shadow-sm:0 2px 10px -4px rgba(15,23,42,.12);
    }
    *{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;color:var(--navy);background:var(--bg);line-height:1.6;-webkit-font-smoothing:antialiased}
    a{color:inherit;text-decoration:none}
    button{font-family:inherit}

    /* ── 顶栏 ── */
    header{position:sticky;top:0;z-index:50;background:var(--navy);color:#fff}
    .topbar{max-width:1200px;margin:0 auto;padding:0 24px;height:64px;display:flex;align-items:center;justify-content:space-between}
    .brand{display:flex;align-items:center;gap:10px;font-weight:700;font-size:18px}
    .brand .mark{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,var(--accent),var(--accent-2));display:grid;place-items:center;font-size:18px}
    .top-actions{display:flex;gap:10px;align-items:center}
    .top-actions a{font-size:14px;color:#cbd5e1;padding:8px 14px;border-radius:8px;transition:background .2s}
    .top-actions a:hover{background:rgba(255,255,255,.08);color:#fff}

    /* ── 主布局 ── */
    .wrap{max-width:1200px;margin:0 auto;padding:32px 24px}
    .tabs{display:flex;gap:8px;margin-bottom:28px;flex-wrap:wrap}
    .tab{padding:11px 22px;border-radius:10px;border:1.5px solid var(--line);background:#fff;font-size:15px;font-weight:600;color:var(--slate);cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:8px}
    .tab:hover{border-color:var(--accent);color:var(--accent)}
    .tab.active{background:var(--navy);color:#fff;border-color:var(--navy)}
    .panel{display:none}
    .panel.show{display:block}

    /* ── 卡片 / 区块 ── */
    .card{background:#fff;border:1px solid var(--line);border-radius:var(--radius);padding:28px;box-shadow:var(--shadow-sm);margin-bottom:24px}
    .card h2{font-size:20px;font-weight:700;margin-bottom:6px;display:flex;align-items:center;gap:8px}
    .card .sub{font-size:14px;color:var(--muted);margin-bottom:24px}

    /* ── 表单 ── */
    .field{margin-bottom:20px}
    .field label{display:block;font-size:14px;font-weight:600;color:var(--navy);margin-bottom:7px}
    .field .hint{font-size:12.5px;color:var(--muted);margin-top:5px;font-weight:400}
    .field input,.field select,.field textarea{width:100%;padding:11px 14px;border:1.5px solid var(--line);border-radius:10px;font-size:14.5px;font-family:inherit;color:var(--navy);background:#fff;transition:border-color .2s,box-shadow .2s}
    .field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(37,99,235,.12)}
    .field textarea{resize:vertical;min-height:80px}
    .req{color:var(--red);margin-left:2px}

    /* ── 按钮 ── */
    .btn{display:inline-flex;align-items:center;gap:7px;padding:11px 22px;border-radius:10px;font-weight:600;font-size:15px;cursor:pointer;border:none;transition:transform .15s,box-shadow .2s,background .2s}
    .btn-primary{background:var(--accent);color:#fff}
    .btn-primary:hover{background:var(--accent-2);transform:translateY(-1px);box-shadow:0 8px 20px -6px rgba(37,99,235,.5)}
    .btn-outline{background:#fff;color:var(--navy);border:1.5px solid var(--line)}
    .btn-outline:hover{border-color:var(--navy)}
    .btn-danger{background:#fff;color:var(--red);border:1.5px solid #fecaca}
    .btn-danger:hover{background:#fef2f2}
    .btn-sm{padding:7px 14px;font-size:13.5px}
    .btn-green{background:var(--green);color:#fff}
    .btn-green:hover{background:#15803d}

    /* ── 操作栏 ── */
    .action-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;gap:14px;flex-wrap:wrap}
    .action-bar .left{display:flex;align-items:center;gap:12px}
    .count-badge{background:#eff6ff;color:var(--accent);font-size:13px;font-weight:700;padding:5px 12px;border-radius:999px}

    /* ── 产品列表 ── */
    .product-list{display:flex;flex-direction:column;gap:14px}
    .product-item{background:#fff;border:1px solid var(--line);border-radius:12px;padding:18px 20px;display:flex;align-items:center;gap:16px;transition:border-color .2s,box-shadow .2s}
    .product-item:hover{border-color:#cbd5e1;box-shadow:var(--shadow-sm)}
    .product-item .thumb{width:64px;height:64px;border-radius:10px;background:var(--bg);object-fit:cover;flex-shrink:0;border:1px solid var(--line)}
    .product-item .info{flex:1;min-width:0}
    .product-item .info .name{font-size:16px;font-weight:700;color:var(--navy);margin-bottom:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .product-item .info .meta{font-size:13px;color:var(--muted);display:flex;gap:10px;flex-wrap:wrap;align-items:center}
    .product-item .info .meta .cat-tag{background:#eff6ff;color:var(--accent);padding:2px 9px;border-radius:6px;font-weight:600}
    .product-item .info .meta .badge-tag{background:#fef3c7;color:#92400e;padding:2px 9px;border-radius:6px;font-weight:600}
    .product-item .actions{display:flex;gap:8px;flex-shrink:0}
    .icon-btn{width:38px;height:38px;border-radius:9px;border:1px solid var(--line);background:#fff;cursor:pointer;display:grid;place-items:center;font-size:16px;transition:all .2s}
    .icon-btn:hover{border-color:var(--accent);color:var(--accent)}
    .icon-btn.danger:hover{border-color:var(--red);color:var(--red)}
    .expand-arrow{width:34px;height:34px;border-radius:8px;border:none;background:transparent;cursor:pointer;display:grid;place-items:center;font-size:18px;color:var(--muted);transition:transform .2s,color .2s;flex-shrink:0}
    .expand-arrow:hover{color:var(--accent)}
    .expand-arrow.open{transform:rotate(90deg);color:var(--accent)}

    /* ── 产品展开编辑区 ── */
    .product-edit{background:#f1f5f9;border:1px solid var(--line);border-radius:12px;padding:24px;margin-top:8px;display:none}
    .product-edit.show{display:block}
    .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
    .spec-input-row{display:flex;gap:8px;margin-bottom:8px}
    .spec-input-row input{flex:1}
    .add-spec-btn{padding:8px 14px;border-radius:8px;border:1.5px dashed var(--line);background:#fff;color:var(--muted);cursor:pointer;font-size:13.5px;transition:all .2s}
    .add-spec-btn:hover{border-color:var(--accent);color:var(--accent)}

    /* ── 提示 / Toast ── */
    .toast{position:fixed;top:24px;right:24px;background:var(--navy);color:#fff;padding:14px 22px;border-radius:10px;box-shadow:var(--shadow);font-size:14.5px;font-weight:500;z-index:1000;opacity:0;transform:translateY(-10px);transition:opacity .3s,transform .3s;pointer-events:none}
    .toast.show{opacity:1;transform:none}
    .toast.success{background:var(--green)}
    .toast.error{background:var(--red)}

    /* ── 加载 / 空 ── */
    .loading{text-align:center;padding:60px 20px;color:var(--muted)}
    .spinner{width:36px;height:36px;border:3px solid var(--line);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 14px}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* ── 确认弹窗 ── */
    .modal-mask{position:fixed;inset:0;background:rgba(15,23,42,.5);display:none;place-items:center;z-index:900}
    .modal-mask.show{display:grid}
    .modal{background:#fff;border-radius:16px;padding:28px;max-width:420px;width:90%;box-shadow:var(--shadow)}
    .modal h3{font-size:18px;font-weight:700;margin-bottom:10px}
    .modal p{font-size:14.5px;color:var(--slate);margin-bottom:22px}
    .modal-actions{display:flex;gap:10px;justify-content:flex-end}

    /* ── 图片预览 ── */
    .img-preview{width:100%;max-width:200px;height:auto;border-radius:10px;border:1px solid var(--line);margin-top:10px}
    .upload-box{border:1.5px dashed var(--line);border-radius:10px;padding:16px;text-align:center;cursor:pointer;transition:border-color .2s;background:var(--bg)}
    .upload-box:hover{border-color:var(--accent)}
    .upload-box input{display:none}
    .upload-box .txt{font-size:13.5px;color:var(--muted)}
    .upload-box .txt b{color:var(--accent)}

    @media(max-width:680px){
      .grid-2{grid-template-columns:1fr}
      .product-item{flex-wrap:wrap}
      .product-item .info{order:-1;width:calc(100% - 50px)}
    }
  </style>
</head>
<body>
  <header>
    <div class="topbar">
      <div class="brand">
        <span class="mark">🛠️</span>
        后台管理系统
      </div>
      <div class="top-actions">
        <a href="/" target="_blank">↗ 查看网站首页</a>
      </div>
    </div>
  </header>

  <div class="wrap">
    <!-- 顶部切换 -->
    <div class="tabs">
      <button class="tab active" data-panel="products">📦 产品目录</button>
      <button class="tab" data-panel="settings">⚙️ 网站设置</button>
    </div>

    <!-- ============ 产品目录 ============ -->
    <div class="panel show" id="panel-products">
      <div class="action-bar">
        <div class="left">
          <h1 style="font-size:24px;font-weight:800">产品目录</h1>
          <span class="count-badge" id="productCount">0 个产品</span>
        </div>
        <button class="btn btn-primary" onclick="addProduct()">＋ 添加新产品</button>
      </div>
      <div id="productListWrap">
        <div class="loading">
          <div class="spinner"></div>
          正在加载产品数据…
        </div>
      </div>
    </div>

    <!-- ============ 网站设置 ============ -->
    <div class="panel" id="panel-settings">
      <div class="card">
        <h2>⚙️ 网站基本信息</h2>
        <p class="sub">修改后点击下方「保存设置」，首页会立即更新。</p>

        <div class="field">
          <label>公司名称 <span class="req">*</span></label>
          <input type="text" id="set-company" />
          <div class="hint">网站顶部 logo 旁边显示的公司名。</div>
        </div>

        <div class="field">
          <label>公司口号（中文）</label>
          <input type="text" id="set-tagline-zh" placeholder="例如：优质电子烟产品 · 全球供应" />
          <div class="hint">中文口号，显示在首页大标题下方（中文模式下）。</div>
        </div>

        <div class="field">
          <label>公司口号（英文）</label>
          <input type="text" id="set-tagline" placeholder="例如：Premium Vaping Products. Global Supply." />
          <div class="hint">英文口号，显示在首页大标题下方（英文模式下），面向海外客户。不会英文可不填。</div>
        </div>

        <div class="grid-2">
          <div class="field">
            <label>销售邮箱 <span class="req">*</span></label>
            <input type="text" id="set-email" />
            <div class="hint">客户发询盘时收件的邮箱地址。</div>
          </div>
          <div class="field">
            <label>WhatsApp / 电话</label>
            <input type="text" id="set-phone" />
            <div class="hint">联系号码，显示在网站的联系区块。</div>
          </div>
        </div>

        <div class="field">
          <label>公司地址（英文）</label>
          <input type="text" id="set-address" />
          <div class="hint">英文地址，面向海外客户显示。</div>
        </div>

        <div class="field">
          <label>表单接口 ID（选填）</label>
          <input type="text" id="set-formspree" placeholder="例如：xgebkvqk" />
          <div class="hint">使用 Formspree 接收询盘表单时填入 ID。不填则表单只弹成功提示、不真正发邮件。</div>
        </div>

        <button class="btn btn-green" onclick="saveSettings()">💾 保存设置</button>
      </div>
    </div>
  </div>

  <!-- 删除确认弹窗 -->
  <div class="modal-mask" id="delModal">
    <div class="modal">
      <h3>确认删除？</h3>
      <p id="delText">删除后无法恢复，确定要删除这个产品吗？</p>
      <div class="modal-actions">
        <button class="btn btn-outline" onclick="closeDel()">取消</button>
        <button class="btn btn-danger" id="delConfirm">删除</button>
      </div>
    </div>
  </div>

  <!-- 提示 toast -->
  <div class="toast" id="toast"></div>

  <script>
    /* ============================================================
       后台管理 JS —— 直接读写本地 JSON 文件
       ============================================================ */

    // 分类、角标中英文映射（只填一边也能用）
    const CAT_ZH2EN = {'一次性小烟':'Disposable Vapes','换弹设备':'Pod Systems','主机设备':'Vape Mods','烟油':'E-Liquid','配件':'Accessories'};
    const CAT_EN2ZH = Object.fromEntries(Object.entries(CAT_ZH2EN).map(([k,v])=>[v,k]));
    const BADGE_ZH2EN = {'热销':'Best Seller','新品':'New','OEM':'OEM','爆款':'Hot','TPD':'TPD','认证':'Certified'};
    const BADGE_EN2ZH = Object.fromEntries(Object.entries(BADGE_ZH2EN).map(([k,v])=>[v,k]));
    const CAT_OPTIONS = ['一次性小烟','换弹设备','主机设备','烟油','配件'];
    const BADGE_OPTIONS = ['','热销','新品','OEM','爆款','TPD','认证'];

    let PRODUCTS = [];
    let SETTINGS = {};

    /* ── 工具函数 ── */
    function esc(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}

    function toast(msg, type='success'){
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = 'toast show ' + type;
      clearTimeout(window._toastT);
      window._toastT = setTimeout(()=>t.className='toast', 2400);
    }

    function patchProduct(p){
      // 中英文自动补全
      if(!p.category && p.category_zh) p.category = CAT_ZH2EN[p.category_zh] || p.category_zh;
      if(!p.category_zh && p.category) p.category_zh = CAT_EN2ZH[p.category] || p.category;
      if(!p.badge && p.badge_zh) p.badge = BADGE_ZH2EN[p.badge_zh] || p.badge_zh;
      if(!p.badge_zh && p.badge) p.badge_zh = BADGE_EN2ZH[p.badge] || p.badge;
      return p;
    }

    /* ── Tab 切换 ── */
    document.querySelectorAll('.tab').forEach(tab=>{
      tab.addEventListener('click', ()=>{
        document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
        document.querySelectorAll('.panel').forEach(p=>p.classList.remove('show'));
        tab.classList.add('active');
        document.getElementById('panel-'+tab.dataset.panel).classList.add('show');
      });
    });

    /* ============================================================
       产品管理
       ============================================================ */
    async function loadProducts(){
      try{
        const r = await fetch('/api/products');
        const data = await r.json();
        PRODUCTS = (data.products||[]).map(patchProduct);
        renderProducts();
      }catch(e){
        document.getElementById('productListWrap').innerHTML = `<div class="loading" style="color:var(--red)">加载失败：${esc(e.message)}<br><br>请确认已用 <code>node server.js</code> 启动服务器（而不是直接打开文件）。</div>`;
      }
    }

    function renderProducts(){
      const wrap = document.getElementById('productListWrap');
      document.getElementById('productCount').textContent = `${PRODUCTS.length} 个产品`;

      if(!PRODUCTS.length){
        wrap.innerHTML = `<div class="loading">还没有产品，点右上角「添加新产品」开始吧。</div>`;
        return;
      }

      wrap.innerHTML = `<div class="product-list">` + PRODUCTS.map((p,i)=>`
        <div class="product-item" data-idx="${i}" draggable="true" ondragstart="dragStart(event,${i})" ondragover="dragOver(event)" ondrop="drop(event,${i})" ondragend="dragEnd(event)">
          <span style="cursor:grab;color:var(--muted);font-size:18px;margin-right:4px" title="拖拽排序">⋮</span>
          <button class="expand-arrow" onclick="toggleEdit(${i})" title="点击展开编辑">▶</button>
          <img class="thumb" src="${esc(p.image?'/'+p.image:'/images/products/.gitkeep')}" alt="" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2264%22 height=%2264%22><rect width=%2264%22 height=%2264%22 fill=%22%23f1f5f9%22/><text x=%2232%22 y=%2238%22 font-size=%2220%22 text-anchor=%22middle%22>📷</text></svg>'"/>
          <div class="info">
            <div class="name">${esc(p.name_zh || p.name || '(未命名)')}</div>
            <div class="meta">
              ${p.category_zh?`<span class="cat-tag">${esc(p.category_zh)}</span>`:''}
              ${p.badge_zh?`<span class="badge-tag">${esc(p.badge_zh)}</span>`:''}
              <span>起订量：${esc(p.moq || '—')}</span>
            </div>
          </div>
          <div class="actions">
            <button class="icon-btn" onclick="toggleEdit(${i})" title="编辑">✏️</button>
            <button class="icon-btn danger" onclick="askDelete(${i})" title="删除">🗑️</button>
          </div>
        </div>
        <div class="product-edit" id="edit-${i}"></div>
      `).join('') + `</div>`;
    }

    /* ── 拖拽排序 ── */
    let dragIdx = -1;
    function dragStart(e, i){
      dragIdx = i;
      e.target.style.opacity = '0.4';
      e.dataTransfer.effectAllowed = 'move';
    }
    function dragOver(e){
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
    }
    function drop(e, targetIdx){
      e.preventDefault();
      if(dragIdx === targetIdx) return;
      // 移动产品
      const item = PRODUCTS.splice(dragIdx, 1)[0];
      PRODUCTS.splice(targetIdx, 0, item);
      renderProducts();
      // 自动保存新顺序
      saveProducts(true).then(()=>toast('✅ 顺序已保存'));
    }
    function dragEnd(e){
      e.target.style.opacity = '1';
    }

    function toggleEdit(i){
      const box = document.getElementById('edit-'+i);
      const arrow = document.querySelector(`.product-item[data-idx="${i}"] .expand-arrow`);
      if(box.classList.contains('show')){
        box.classList.remove('show');
        arrow.classList.remove('open');
        return;
      }
      box.innerHTML = productEditHTML(PRODUCTS[i], i);
      box.classList.add('show');
      arrow.classList.add('open');
    }

    function productEditHTML(p, i){
      const specs = p.specs_zh || [];
      const specsEn = p.specs || [];
      return `
        <div class="field">
          <label>中文产品名 <span class="req">*</span></label>
          <input type="text" value="${esc(p.name_zh||'')}" oninput="PRODUCTS[${i}].name_zh=this.value" placeholder="例如：一次性电子烟 — 5000口"/>
          <div class="hint">产品中文名称，中文页面会显示这个名字。</div>
        </div>
        <div class="field">
          <label>英文产品名</label>
          <input type="text" value="${esc(p.name||'')}" oninput="PRODUCTS[${i}].name=this.value" placeholder="例如：Disposable Vape Pen — 5000 Puffs"/>
          <div class="hint">面向海外客户显示。不会英文可以填中文拼音或留空。</div>
        </div>
        <div class="grid-2">
          <div class="field">
            <label>产品分类 <span class="req">*</span></label>
            <select onchange="PRODUCTS[${i}].category_zh=this.value;PRODUCTS[${i}].category=CAT_ZH2EN[this.value]||'';renderProducts();toggleEdit(${i})">
              <option value="">— 请选择 —</option>
              ${CAT_OPTIONS.map(c=>`<option ${p.category_zh===c?'selected':''}>${c}</option>`).join('')}
            </select>
            <div class="hint">选一次中文分类即可，英文会自动对应。</div>
          </div>
          <div class="field">
            <label>产品角标（选填）</label>
            <select onchange="PRODUCTS[${i}].badge_zh=this.value;PRODUCTS[${i}].badge=BADGE_ZH2EN[this.value]||'';renderProducts();toggleEdit(${i})">
              ${BADGE_OPTIONS.map(c=>`<option value="${c}" ${p.badge_zh===c?'selected':''}>${c||'— 不显示 —'}</option>`).join('')}
            </select>
            <div class="hint">产品图片左上角的标签。</div>
          </div>
        </div>
        <div class="field">
          <label>中文描述</label>
          <textarea oninput="PRODUCTS[${i}].description_zh=this.value" placeholder="用中文简单介绍产品（1-2 句）">${esc(p.description_zh||'')}</textarea>
        </div>
        <div class="field">
          <label>英文描述</label>
          <textarea oninput="PRODUCTS[${i}].description=this.value" placeholder="不会英文可不填，网站会自动显示中文描述。">${esc(p.description||'')}</textarea>
        </div>

        <div class="grid-2">
          <div class="field">
            <label>中文规格标签</label>
            <div id="specsZh-${i}">
              ${(specs.length?specs:['']).map((s,k)=>specRow('specsZh',i,k,s)).join('')}
            </div>
            <button class="add-spec-btn" onclick="addSpecRow('specsZh',${i})">＋ 添加一项规格</button>
            <div class="hint">例如：5000口、12ml、850mAh。</div>
          </div>
          <div class="field">
            <label>英文规格标签</label>
            <div id="specsEn-${i}">
              ${(specsEn.length?specsEn:['']).map((s,k)=>specRow('specsEn',i,k,s)).join('')}
            </div>
            <button class="add-spec-btn" onclick="addSpecRow('specsEn',${i})">＋ 添加一项规格</button>
            <div class="hint">不会英文可不填。</div>
          </div>
        </div>

        <div class="field">
          <label>起订量</label>
          <input type="text" value="${esc(p.moq||'')}" oninput="PRODUCTS[${i}].moq=this.value" placeholder="例如：1000 pcs"/>
        </div>

        <div class="field">
          <label>产品图片</label>
          <label class="upload-box">
            <input type="file" accept="image/*" onchange="uploadImage(${i}, this)"/>
            <div class="txt">📷 点击上传图片，或拖拽到此区域<br><b>支持 PNG / JPG，建议白色背景，4:3 比例</b></div>
          </label>
          ${p.image?`<img class="img-preview" src="/${esc(p.image)}" onerror="this.style.display='none'"/>`:''}
        </div>

        <div style="display:flex;gap:10px;margin-top:24px;border-top:1px solid var(--line);padding-top:20px">
          <button class="btn btn-primary" onclick="saveProducts()">💾 保存修改</button>
          <button class="btn btn-outline" onclick="toggleEdit(${i})">收起</button>
        </div>
      `;
    }

    function specRow(prefix, i, k, val){
      return `
        <div class="spec-input-row" id="${prefix}-${i}-${k}">
          <input type="text" value="${esc(val)}" oninput="updateSpecs('${prefix}',${i})" placeholder="例如：5000口"/>
          <button class="icon-btn danger" onclick="this.parentNode.remove();updateSpecs('${prefix}',${i})">×</button>
        </div>
      `;
    }

    function addSpecRow(prefix, i){
      const wrap = document.getElementById(prefix+'-'+i);
      const k = wrap.children.length;
      const div = document.createElement('div');
      div.className = 'spec-input-row';
      div.id = `${prefix}-${i}-${k}`;
      div.innerHTML = `
        <input type="text" oninput="updateSpecs('${prefix}',${i})" placeholder="例如：5000口"/>
        <button class="icon-btn danger" onclick="this.parentNode.remove();updateSpecs('${prefix}',${i})">×</button>
      `;
      wrap.appendChild(div);
    }

    function updateSpecs(prefix, i){
      const wrap = document.getElementById(prefix+'-'+i);
      const vals = [...wrap.querySelectorAll('input')].map(inp=>inp.value).filter(v=>v.trim()!=='');
      if(prefix==='specsZh') PRODUCTS[i].specs_zh = vals;
      else PRODUCTS[i].specs = vals;
    }

    async function uploadImage(i, input){
      const file = input.files[0];
      if(!file) return;
      const fd = new FormData();
      fd.append('file', file);
      try{
        toast('正在上传图片…');
        const r = await fetch('/api/upload', {method:'POST', body:fd});
        const data = await r.json();
        if(data.ok){
          PRODUCTS[i].image = data.path;
          toast('图片上传成功！');
          // 保存当前展开状态
          const expandedIdx = i;
          renderProducts();
          // 恢复展开状态
          setTimeout(()=>toggleEdit(expandedIdx), 50);
        }else{
          toast('上传失败：'+(data.error||''), 'error');
        }
      }catch(e){
        toast('上传失败：'+e.message, 'error');
      }
    }

    function addProduct(){
      PRODUCTS.unshift(patchProduct({
        name_zh: '', name: '',
        category_zh: '', category: '',
        badge_zh: '', badge: '',
        description_zh: '', description: '',
        specs_zh: [], specs: [],
        moq: '', image: ''
      }));
      renderProducts();
      // 自动展开新产品(现在在第一个位置)
      setTimeout(()=>toggleEdit(0), 50);
      toast('已添加新产品到列表顶部，请填写信息后保存');
      document.querySelector('.product-list').firstElementChild.scrollIntoView({behavior:'smooth', block:'center'});
    }

    /* ── 删除 ── */
    let delIdx = -1;
    function askDelete(i){
      delIdx = i;
      document.getElementById('delText').textContent = `确定要删除「${PRODUCTS[i].name_zh || PRODUCTS[i].name || '未命名产品'}」吗？删除后无法恢复。`;
      document.getElementById('delModal').classList.add('show');
    }
    function closeDel(){
      document.getElementById('delModal').classList.remove('show');
      delIdx = -1;
    }
    document.getElementById('delConfirm').addEventListener('click', async ()=>{
      if(delIdx<0) return;
      const product = PRODUCTS[delIdx];
      // 如果有图片，先删除图片文件
      if(product.image){
        try{
          await fetch('/api/upload?path='+encodeURIComponent(product.image), {method:'DELETE'});
        }catch(e){
          console.error('删除图片失败:', e);
        }
      }
      PRODUCTS.splice(delIdx,1);
      closeDel();
      renderProducts();
      await saveProducts(true);
      toast('✅ 产品已删除');
    });

    /* ── 保存 ── */
    async function saveProducts(silent){
      // 清理 specs 中可能残留的空字符串
      PRODUCTS.forEach(p=>{
        p.specs_zh = (p.specs_zh||[]).filter(s=>s && s.trim());
        p.specs = (p.specs||[]).filter(s=>s && s.trim());
      });
      try{
        const r = await fetch('/api/products', {
          method:'PUT',
          headers:{'Content-Type':'application/json'},
          body: JSON.stringify({products:PRODUCTS})
        });
        const data = await r.json();
        if(data.ok){
          if(!silent) toast('✅ 产品已保存到 products.json');
          renderProducts();
        }else{
          toast('保存失败：'+(data.error||''), 'error');
        }
      }catch(e){
        toast('保存失败：'+e.message, 'error');
      }
    }

    /* ============================================================
       网站设置
       ============================================================ */
    async function loadSettings(){
      try{
        const r = await fetch('/api/settings');
        SETTINGS = await r.json();
        document.getElementById('set-company').value = SETTINGS.company || '';
        document.getElementById('set-tagline').value = SETTINGS.tagline || '';
        document.getElementById('set-tagline-zh').value = SETTINGS.tagline_zh || '';
        document.getElementById('set-email').value = SETTINGS.email || '';
        document.getElementById('set-phone').value = SETTINGS.phone || '';
        document.getElementById('set-address').value = SETTINGS.address || '';
        document.getElementById('set-formspree').value = SETTINGS.formspree_id || '';
      }catch(e){
        toast('加载设置失败：'+e.message, 'error');
      }
    }

    async function saveSettings(){
      SETTINGS = {
        company: document.getElementById('set-company').value.trim(),
        tagline: document.getElementById('set-tagline').value.trim(),
        tagline_zh: document.getElementById('set-tagline-zh').value.trim(),
        email: document.getElementById('set-email').value.trim(),
        phone: document.getElementById('set-phone').value.trim(),
        address: document.getElementById('set-address').value.trim(),
        formspree_id: document.getElementById('set-formspree').value.trim()
      };
      if(!SETTINGS.company){
        toast('请填写公司名称', 'error');
        return;
      }
      try{
        const r = await fetch('/api/settings', {
          method:'PUT',
          headers:{'Content-Type':'application/json'},
          body: JSON.stringify(SETTINGS)
        });
        const data = await r.json();
        if(data.ok){
          toast('✅ 网站设置已保存，刷新首页即可看到更新');
        }else{
          toast('保存失败：'+(data.error||''), 'error');
        }
      }catch(e){
        toast('保存失败：'+e.message, 'error');
      }
    }

    /* ── 启动 ── */
    loadProducts();
    loadSettings();

    // 关闭弹窗：点遮罩
    document.getElementById('delModal').addEventListener('click', e=>{
      if(e.target.id==='delModal') closeDel();
    });
  </script>
</body>
</html>
