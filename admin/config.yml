backend:
  name: git-gateway
  branch: main

media_folder: "images/products"
public_folder: "/images/products"

site_url: https://vapex-trade.netlify.app
display_url: https://vapex-trade.netlify.app

collections:
  - name: "catalog"
    label: "Products"
    label_singular: "Product"
    description: "Manage products shown on the homepage."
    delete: false
    editor:
      preview: false
    files:
      - label: "Product List"
        name: "products"
        file: "products.json"
        fields:
          - label: "Products"
            name: "products"
            widget: "list"
            add_to_top: true
            summary: "{{fields.name_zh}}"
            fields:
              - { label: "Name (EN)", name: "name", widget: "string" }
              - { label: "Name (ZH)", name: "name_zh", widget: "string" }
              - { label: "Category (EN)", name: "category", widget: "select", options: ["Disposable Vapes", "Pod Systems", "Vape Mods", "E-Liquid", "Accessories"] }
              - { label: "Category (ZH)", name: "category_zh", widget: "select", options: ["一次性小烟", "换弹设备", "主机设备", "烟油", "配件"] }
              - { label: "Badge (EN)", name: "badge", widget: "select", required: false, options: ["Best Seller", "New", "OEM", "Hot", "TPD", "Certified"] }
              - { label: "Badge (ZH)", name: "badge_zh", widget: "select", required: false, options: ["热销", "新品", "OEM", "爆款", "TPD", "认证"] }
              - { label: "Description (EN)", name: "description", widget: "text" }
              - { label: "Description (ZH)", name: "description_zh", widget: "text" }
              - { label: "Specs (EN)", name: "specs", widget: "list", required: false }
              - { label: "Specs (ZH)", name: "specs_zh", widget: "list", required: false }
              - { label: "MOQ", name: "moq", widget: "string" }
              - { label: "Image", name: "image", widget: "image" }

  - name: "settings"
    label: "Site Settings"
    delete: false
    editor:
      preview: false
    files:
      - label: "Settings"
        name: "settings"
        file: "site-settings.json"
        fields:
          - { label: "Brand", name: "brand", widget: "string", default: "Vapex" }
          - { label: "Company", name: "company", widget: "string", default: "深圳维派克斯科技有限公司" }
          - { label: "Tagline (EN)", name: "tagline", widget: "string", default: "Premium Vaping Products. Global Supply." }
          - { label: "Tagline (ZH)", name: "tagline_zh", widget: "string", default: "优质电子烟产品 · 全球供应" }
          - { label: "Email", name: "email", widget: "string", default: "sales@example.com" }
          - { label: "Phone", name: "phone", widget: "string", default: "+86 138 0000 0000" }
          - { label: "Address (EN)", name: "address", widget: "string", default: "Shenzhen, China" }
          - { label: "Address (ZH)", name: "address_zh", widget: "string", default: "中国 深圳" }
          - { label: "Formspree ID", name: "formspree_id", widget: "string", required: false }
